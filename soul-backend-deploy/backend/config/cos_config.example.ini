# 腾讯云 COS 配置文件示例
# 复制此文件为 cos_config.ini 并填写您的配置
# 
# 获取方式：
# 1. 登录腾讯云控制台: https://console.cloud.tencent.com/
# 2. 进入 对象存储 COS 服务
# 3. 创建存储桶（Bucket）
# 4. 在 访问管理 -> 访问密钥 中获取 SecretId 和 SecretKey
#
# 注意：
# - 环境变量优先级高于配置文件
# - 生产环境建议使用环境变量配置

[cos]
# 是否启用 COS 存储（true/false）
enabled = false

# 腾讯云 SecretId
# 环境变量: SOUL_COS_SECRET_ID
secret_id = your_secret_id_here

# 腾讯云 SecretKey
# 环境变量: SOUL_COS_SECRET_KEY
secret_key = your_secret_key_here

# COS 存储桶所在地域
# 例如: ap-guangzhou, ap-shanghai, ap-beijing
# 环境变量: SOUL_COS_REGION
region = ap-guangzhou

# COS 存储桶名称（包含 APPID）
# 格式: bucket-name-appid
# 例如: soul-data-1234567890
# 环境变量: SOUL_COS_BUCKET
bucket = your-bucket-name-appid
